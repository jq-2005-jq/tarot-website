<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗占卜 · 多牌阵自选 + 浏览器AI解读</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>
<div class="particles" id="particles"></div>

<main class="container">
  <header class="header">
    <h1 class="title">塔罗占卜</h1>
    <p class="subtitle">静心冥想，选择你想要的牌阵</p>
  </header>

  <!-- 牌阵选择 -->
  <section id="spread-section" class="spread-section">
    <div class="spread-cards" id="spread-cards">
      <button class="spread-option active" data-spread="three">
        <span class="spread-icon">🂠🂠🂠</span>
        <span class="spread-name">三张牌阵</span>
        <span class="spread-hint">过去 · 现在 · 未来</span>
      </button>
      <button class="spread-option" data-spread="single">
        <span class="spread-icon">🂠</span>
        <span class="spread-name">单张指引</span>
        <span class="spread-hint">每日一抽 · 快速问答</span>
      </button>
      <button class="spread-option" data-spread="cross">
        <span class="spread-icon">🂠🂠🂠🂠🂠</span>
        <span class="spread-name">五张十字</span>
        <span class="spread-hint">全景深度解析</span>
      </button>
    </div>
    <div class="question-row">
      <input id="question-input" class="question-input" type="text" maxlength="200" placeholder="你想问什么？（可选，例如：我的感情运如何？）" />
    </div>
    <button id="draw-btn" class="btn btn-draw">开始抽牌</button>
  </section>

  <!-- 牌面展示区 (动态渲染) -->
  <section id="cards-section" class="cards-section hidden">
    <div class="cards-row" id="cards-row"></div>
    <p class="flip-hint">点击牌面翻开</p>
  </section>

  <!-- 解读区 -->
  <section id="reading-section" class="reading-section hidden">
    <div id="reading-content"></div>
    <div id="ai-reading" class="ai-reading hidden"></div>
    <button id="reshuffle-btn" class="btn btn-reshuffle">重新选择牌阵</button>
  </section>
</main>

<script src="js/tarot-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
